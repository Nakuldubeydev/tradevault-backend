

services:

  mysql:
    image: mysql:8.0
    container_name: tradevault-mysql
    environment:
      MYSQL_ROOT_PASSWORD: nakul
      MYSQL_DATABASE: tradevault
    ports:
      - "3308:3306"
    volumes:
      - ./tradevault.sql:/docker-entrypoint-initdb.d/tradevault.sql
      - mysql-data:/var/lib/mysql

  backend:
    image: backendimage:latest
    container_name: tradevault-backend
    ports:
      - "9090:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/tradevault
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USERNAME}
      SPRING_DATASOURCE_PASSWORD: ${SPRING_DATASOURCE_PASSWORD}

    depends_on:
      - mysql

volumes:
  mysql-data: